version: '3.9'

# ── Bede LWA (Lightweight Agent) — Raspberry Pi / low-power hardware ──────────
#
# Tuned for ARM64 / ARMv7 boards: Pi 4 (4 GB) or better.
# Uses Claude Haiku for faster responses and lower API cost.
# Voice biometrics are disabled (no Whisper/Resemblyzer).
# SQLite only — no PostgreSQL required.
#
# Start:  docker compose -f docker-compose.lwa.yml up -d
# Or:     make lwa

services:
  api:
    build:
      context: ./homeschool-api
      dockerfile: Dockerfile.lwa          # stripped image: no whisper, no resemblyzer
    expose:
      - "8000"
    command:
      - uvicorn
      - main:app
      - --host=0.0.0.0
      - --port=8000
      - --workers=2                       # Pi 4 has 4 cores; 2 workers is safe
      - --loop=uvloop
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY is required}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
      - SERVER_KEY=${SERVER_KEY:?SERVER_KEY is required}
      - DATABASE_URL=                     # always SQLite on LWA
      - SQLITE_PATH=/data/bede.db
      - SITE_URL=${SITE_URL:?SITE_URL is required}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://bede.local,http://ui:80}
      - DISABLE_API_DOCS=true
      - PRODUCTION=true
      - VOICE_AUTH_ENABLED=false          # skip Whisper / Resemblyzer
      - TUTOR_MODEL=claude-haiku-4-5-20251001
      - SUMMARY_MODEL=claude-haiku-4-5-20251001
    volumes:
      - bede_data:/data
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    networks:
      - internal
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m

  ui:
    build:
      context: ./homeschool-tutor
      dockerfile: Dockerfile
    expose:
      - "80"
    depends_on:
      - api
    networks:
      - internal
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=8m,mode=1777
      - /var/cache/nginx:size=16m
      - /var/run:size=4m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          memory: 64m
        reservations:
          memory: 32m

  caddy:
    image: caddy:2-alpine
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    networks:
      - internal
    depends_on:
      - ui
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 64m

volumes:
  caddy_data:
  bede_data:

networks:
  internal:
    driver: bridge
    internal: false
